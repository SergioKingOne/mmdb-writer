name: Release-plz

on:
  push:
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'SergioKingOne' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      # Only prepares the release PR (version bump + changelog). Publishing to crates.io is
      # intentionally not enabled yet. To enable it, add the `CARGO_REGISTRY_TOKEN` secret
      # and change `command` to `release-pr` plus a separate `release` run (or remove it to
      # run both).
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
